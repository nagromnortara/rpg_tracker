<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>RPG Tracker</title>
    <script>
      // Redirect all paths to index.html for SPA routing on GitHub Pages (custom domain, pathSegmentsToKeep=0)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
