<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rpg_tracker/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script>
      // SPA redirect for GitHub Pages
      (function(l){
        if(l.search[1]=='/'){
          var decoded=l.search.slice(1).split('&').map(function(s){
            return s.replace(/~and~/g,'&')
          }).join('?');
          window.history.replaceState(null,null,
            l.pathname.slice(0,-1)+decoded+l.hash);
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
